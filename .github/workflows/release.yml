name: Release

on:
  push:
    tags:
      - "v*" # triggers on v1.0.0, v0.1.2, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # needed for npm provenance

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org # THIS is what enables NPM_TOKEN auth

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + Lint + Test
        run: npm run ci # your existing ci script from package.json

      - name: Build library
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
